[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com https://*.tile.openstreetmap.org https://images.unsplash.com; media-src 'self' https://res.cloudinary.com; connect-src 'self' https://api.openrouteservice.org https://*.tile.openstreetmap.org; worker-src 'self' blob:;"
